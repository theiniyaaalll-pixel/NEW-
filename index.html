<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ml5.js bodySegmentation with Three.js</title>
  <script src="p5.min.js"></script>
  <script src="ml5.min.js"></script>
  <script src="Tone.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Arial', sans-serif;
    }

    canvas {
      display: block;
    }

    #startOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.8s ease;
    }

    #startOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #startButton {
      padding: 20px 50px;
      font-size: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
      font-weight: bold;
    }

    #startButton:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }

    #startButton:active {
      transform: translateY(0);
    }

    .overlay-text {
      color: #888;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div id="p5Canvas"></div>

  <!-- Screenshot Preview Modal -->
  <div id="screenshot-modal"
    style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.9); border:1px solid #00f0ff; padding:20px; z-index:2000; text-align:center; border-radius:10px; box-shadow: 0 0 30px rgba(0,240,255,0.3);">
    <h3 style="color:#00f0ff; font-family: 'Courier New', monospace; margin-top:0;">CAPTURE SAVED</h3>
    <img id="screenshot-preview" style="max-width:80vw; max-height:70vh; border:2px solid #333; margin:10px 0;">
    <br>
    <button onclick="document.getElementById('screenshot-modal').style.display='none'"
      style="background:transparent; border:1px solid #00f0ff; color:#00f0ff; padding:8px 20px; cursor:pointer; font-family:'Courier New'; margin-top:10px;">CLOSE</button>
  </div>

  <script src="audio.js"></script>
  <script src="sketch.js"></script>
</body>

</html>
